version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: studyflow
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
